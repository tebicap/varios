<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabador a Groq Whisper</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .api-key-section {
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        #record-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #record-btn:active, #record-btn.recording {
            background-color: #dc3545;
            transform: scale(0.9);
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.5);
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            border: 1px solid #eee;
            min-height: 50px;
            text-align: left;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .loader {
            display: none;
            margin: 10px auto;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Groq Whisper</h2>
    
    <div class="api-key-section">
        <label for="apiKey">Groq API Key:</label>
        <input type="textarea" id="apiKey" placeholder="gsk_..." />
    </div>

    <p>Mantén presionado para grabar:</p>
    
    <button id="record-btn">
        GRABAR
    </button>
    
    <div id="status" class="status">Listo</div>
    <div id="loader" class="loader"></div>
    
    <div id="result">La transcripción aparecerá aquí...</div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    const recordBtn = document.getElementById('record-btn');
    const statusText = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const apiKeyInput = document.getElementById('apiKey');
    const loader = document.getElementById('loader');

    // Inicializar micrófono
    async function initAudio() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                await sendToGroq(audioBlob);
            };
        } catch (err) {
            console.error("Error al acceder al micrófono:", err);
            statusText.innerText = "Error: No se pudo acceder al micrófono";
        }
    }

    async function sendToGroq(blob) {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            alert("Por favor, ingresa tu API Key de Groq");
            return;
        }

        loader.style.display = "block";
        statusText.innerText = "Procesando transcripción...";
        
        const formData = new FormData();
        // El archivo debe llamarse 'file' para la API de Groq
        formData.append('file', blob, 'recording.webm');
        formData.append('model', 'whisper-large-v3-turbo');
        formData.append('response_format', 'verbose_json');
        formData.append('temperature', '0');

        try {
            const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`
                },
                body: formData
            });

            const data = await response.json();
            
            if (response.ok) {
                resultDiv.innerText = data.text;
                statusText.innerText = "Completado";
            } else {
                resultDiv.innerText = "Error API: " + (data.error?.message || "Error desconocido");
                statusText.innerText = "Error";
            }
        } catch (error) {
            console.error("Error:", error);
            resultDiv.innerText = "Error de red o CORS.";
            statusText.innerText = "Error";
        } finally {
            loader.style.display = "none";
        }
    }

    // Lógica de los eventos de presionar
    const startRecording = (e) => {
        e.preventDefault();
        if (!mediaRecorder) {
            alert("El micrófono no está listo");
            return;
        }
        audioChunks = [];
        mediaRecorder.start();
        recordBtn.classList.add('recording');
        statusText.innerText = "Grabando...";
    };

    const stopRecording = (e) => {
        e.preventDefault();
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            recordBtn.classList.remove('recording');
            statusText.innerText = "Grabación finalizada";
        }
    };

    // Soporte para Mouse
    recordBtn.addEventListener('mousedown', startRecording);
    window.addEventListener('mouseup', stopRecording);

    // Soporte para Touch (Móviles)
    recordBtn.addEventListener('touchstart', startRecording);
    window.addEventListener('touchend', stopRecording);

    // Inicializar al cargar
    initAudio();
</script>

</body>
</html>
